spring:
  application:
    name: knowledge-base
  datasource:
    hikari:
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:5000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:3000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

server:
  port: 8080
  address: 0.0.0.0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: dGhpc0lzQVZlcnlMb25nQW5kU2VjdXJlS2V5Rm9ySldUU2lnbmluZzIwMjQ=
  expires-in: 7200

storage:
  type: local
  local:
    base-path: ./storage
    bucket: kb-documents

vector:
  milvus:
    enabled: ${VECTOR_MILVUS_ENABLED:false}
    endpoint: ${VECTOR_MILVUS_ENDPOINT:http://localhost:19530}
    token: ${VECTOR_MILVUS_TOKEN:}
    collection-name: ${VECTOR_MILVUS_COLLECTION_NAME:kb_document_chunks}
    dimension: ${VECTOR_MILVUS_DIMENSION:1536}
    timeout: ${VECTOR_MILVUS_TIMEOUT:15}
