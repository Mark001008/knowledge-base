spring:
  application:
    name: knowledge-base

server:
  port: 8080
  address: 0.0.0.0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: dGhpc0lzQVZlcnlMb25nQW5kU2VjdXJlS2V5Rm9ySldUU2lnbmluZzIwMjQ=
  expires-in: 7200

storage:
  type: local
  local:
    base-path: ./storage
    bucket: kb-documents

vector:
  milvus:
    endpoint: ${VECTOR_MILVUS_ENDPOINT:http://localhost:19530}
    token: ${VECTOR_MILVUS_TOKEN:}
    collection-name: ${VECTOR_MILVUS_COLLECTION_NAME:kb_document_chunks}
    dimension: ${VECTOR_MILVUS_DIMENSION:1536}
    timeout: ${VECTOR_MILVUS_TIMEOUT:15}
