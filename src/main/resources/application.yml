spring:
  application:
    name: knowledge-base

  # MySQL 数据库配置
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:agent}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 60000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 30000

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ma.agent.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  address: 0.0.0.0

agent:
  model:
    provider: ${MODEL_PROVIDER:mock}
    base-url: ${MODEL_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
    api-key: ${MODEL_API_KEY:}
    model: ${MODEL_NAME:mimo-v2.5-pro}
    timeout: ${MODEL_TIMEOUT:30s}
  document:
    provider: ${DOCUMENT_PROVIDER:local}
  knowledge:
    provider: ${KNOWLEDGE_PROVIDER:keyword}
  oss:
    endpoint: ${OSS_ENDPOINT:http://localhost:9000}
    access-key: ${OSS_ACCESS_KEY:}
    secret-key: ${OSS_SECRET_KEY:}
    bucket: ${OSS_BUCKET:agent-documents}
